image: node:20

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

default:
  tags:
    - latex-runner

stages:
  - check
  - build

cache:
  key: npm-$CI_COMMIT_REF_SLUG
  paths:
    - node_modules/

before_script:
  - npm install --ignore-scripts

check:
  stage: check
  script:
    - npm run check

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
