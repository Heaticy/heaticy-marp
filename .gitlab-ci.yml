image: node:20

stages:
  - check
  - build
  - test

variables:
  PNPM_HOME: /root/.local/share/pnpm
  PATH: /root/.local/share/pnpm:$PATH
  PNPM_STORE_DIR: .pnpm-store

cache:
  key: pnpm-$CI_COMMIT_REF_SLUG
  paths:
    - node_modules/
    - .pnpm-store/

before_script:
  - corepack enable
  - corepack prepare pnpm@10.5.0 --activate
  - pnpm config set store-dir $PNPM_STORE_DIR
  - pnpm install --frozen-lockfile

check:
  stage: check
  script:
    - pnpm check

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

test:
  stage: test
  script:
    - pnpm test
