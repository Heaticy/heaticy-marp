image: node:20

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

default:
  tags:
    - latex-runner

stages:
  - check
  - build

variables:
  PNPM_HOME: /root/.local/share/pnpm
  PATH: /root/.local/share/pnpm:$PATH
  PNPM_STORE_DIR: .pnpm-store

cache:
  key: pnpm-$CI_COMMIT_REF_SLUG
  paths:
    - node_modules/
    - .pnpm-store/

before_script:
  - corepack enable
  - corepack prepare pnpm@10.5.0 --activate
  - pnpm config set store-dir $PNPM_STORE_DIR
  - pnpm install --frozen-lockfile

check:
  stage: check
  script:
    - pnpm check

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
